services:
  postgres:
    image: postgres:16-alpine
    container_name: unipile-go-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unipile
      POSTGRES_PASSWORD: unipile
      POSTGRES_DB: unipile_go
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unipile -d unipile_go"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

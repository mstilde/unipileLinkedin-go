version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "internal/db/migrations"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        emit_empty_slices: true
        emit_prepared_queries: false
        emit_exact_table_names: false
        rename:
          ab: "AB"
          ai: "AI"
          api: "API"
          icp: "ICP"
          id: "ID"
          ids: "IDs"
          pii: "PII"
          tz: "TZ"
          url: "URL"
          urn: "URN"
          utc: "UTC"
          uuid: "UUID"
